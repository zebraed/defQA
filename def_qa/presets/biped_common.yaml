template: biped_common
version: 0.1.0

timeline:
  start_frame: 1
  default_span: 8
  gap_frame: 4
  part_gap_frame: 10
  return_to_neutral: true

options:
  use_animation_layer: false
  animation_layer_name: defQA_anim_layer
  create_time_slider_bookmarks: false
  enable_translate: true
  enable_rotate: true
  enable_scale: false

pair_rules:
  - left: "_L_"
    right: "_R_"
  - left: "_L0_"
    right: "_R0_"
  - left: "_L"
    right: "_R"
  - left: "left"
    right: "right"
  - left: "Left"
    right: "Right"

parts:
  root_cog:
    pair_mode: single
    patterns:
      - "*root*ctl"
      - "*cog*ctl"
      - "*pelvis*ctl"
      - "*hips*ctl"
    tests:
      rotateX:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateY:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateZ:
        values: [0, 90, 0, -90, 0]
        span: 8

  spine:
    pair_mode: single
    patterns:
      - "*spine*ctl"
      - "*body*ctl"
      - "*chest*ctl"
      - "*torso*ctl"
    tests:
      rotateX:
        values: [0, 30, 0, -30, 0]
        span: 8
      rotateY:
        values: [0, 30, 0, -30, 0]
        span: 8
      rotateZ:
        values: [0, 30, 0, -30, 0]
        span: 8

  neck_head:
    pair_mode: single
    patterns:
      - "*neck*ctl"
      - "*head*ctl"
    tests:
      rotateX:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateY:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateZ:
        values: [0, 90, 0, -90, 0]
        span: 8

  arms:
    pair_mode: pair_mirror
    left_patterns:
      - "*arm*L*ctl"
      - "*shoulder*L*ctl"
      - "*uparm*L*ctl"
      - "*forearm*L*ctl"
    right_patterns:
      - "*arm*R*ctl"
      - "*shoulder*R*ctl"
      - "*uparm*R*ctl"
      - "*forearm*R*ctl"
    tests:
      rotateX:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateY:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateZ:
        values: [0, 90, 0, -90, 0]
        span: 8

  hands:
    pair_mode: pair_mirror
    left_patterns:
      - "*hand*L*ctl"
      - "*wrist*L*ctl"
    right_patterns:
      - "*hand*R*ctl"
      - "*wrist*R*ctl"
    tests:
      rotateX:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateY:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateZ:
        values: [0, 90, 0, -90, 0]
        span: 8

  legs:
    pair_mode: pair_mirror
    left_patterns:
      - "*leg*L*ctl"
      - "*hip*L*ctl"
      - "*thigh*L*ctl"
      - "*knee*L*ctl"
    right_patterns:
      - "*leg*R*ctl"
      - "*hip*R*ctl"
      - "*thigh*R*ctl"
      - "*knee*R*ctl"
    tests:
      rotateX:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateY:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateZ:
        values: [0, 90, 0, -90, 0]
        span: 8

  feet:
    pair_mode: pair_mirror
    left_patterns:
      - "*foot*L*ctl"
      - "*ankle*L*ctl"
    right_patterns:
      - "*foot*R*ctl"
      - "*ankle*R*ctl"
    tests:
      rotateX:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateY:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateZ:
        values: [0, 90, 0, -90, 0]
        span: 8

  fingers:
    pair_mode: pair_mirror
    left_patterns:
      - "*finger*L*ctl"
      - "*thumb*L*ctl"
      - "*index*L*ctl"
      - "*middle*L*ctl"
      - "*ring*L*ctl"
      - "*pinky*L*ctl"
    right_patterns:
      - "*finger*R*ctl"
      - "*thumb*R*ctl"
      - "*index*R*ctl"
      - "*middle*R*ctl"
      - "*ring*R*ctl"
      - "*pinky*R*ctl"
    tests:
      rotateX:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateY:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateZ:
        values: [0, 90, 0, -90, 0]
        span: 8
