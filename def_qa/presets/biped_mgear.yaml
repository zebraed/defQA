        span: 8
  arms:
    pair_mode: pair_same
    left_patterns:
    - '*arm_L0_fk0_ctl*'
    - '*arm_L0_fk1_ctl*'
    - '*arm_L0_fk2_ctl*'
    - '*arm_L0_upv_ctl*'
