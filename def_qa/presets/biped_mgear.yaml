template: biped_mgear
version: 0.1.0
timeline:
  start_frame: 1
  default_span: 8
  gap_frame: 4
  part_gap_frame: 10
  return_to_neutral: true
options:
  use_animation_layer: false
  animation_layer_name: defQA_anim_layer
  create_time_slider_bookmarks: true
  enable_translate: true
  enable_rotate: true
  enable_scale: false
  return_to_neutral: true
pair_rules:
- left: _L_
  right: _R_
- left: _L0_
  right: _R0_
- left: _L
  right: _R
parts:
  root_cog:
    pair_mode: single
    patterns:
    - '*global_C0_ctl*'
    tests:
      translateX:
        values: [0, 0.2, 0, -0.2, 0]
        span: 8
      translateY:
        values: [0, 0.2, 0, -0.2, 0]
        span: 8
      translateZ:
        values: [0, 0.2, 0, -0.2, 0]
        span: 8
      rotateX:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateY:
        values: [0, 90, 0, -90, 0]
        span: 8
      rotateZ:
        values: [0, 90, 0, -90, 0]
        span: 8
      scaleX:
        values: [1.0, 1.5, 1.0, 0.5, 1.0]
        span: 8
      scaleY:
        values: [1.0, 1.5, 1.0, 0.5, 1.0]
        span: 8
      scaleZ:
        values: [1.0, 1.5, 1.0, 0.5, 1.0]
        span: 8
  spine:
    pair_mode: single
    patterns:
    - '*spine_C0_fk0_ctl*'
    - '*spine_C0_fk1_ctl*'
    - '*spine_C0_fk2_ctl*'
    - '*spine_C0_ik0_ctl*'
    - '*spine_C0_ik1_ctl*'
    - '*spine_C0_spinePosition_ctl*'
    - '*spine_C0_tan0_ctl*'
    - '*spine_C0_tan1_ctl*'
    - '*spine_C0_tan_ctl*'
    tests:
      translateX:
        values: [0, 0.2, 0, -0.2, 0]
        span: 8
      translateY:
        values: [0, 0.2, 0, -0.2, 0]
        span: 8
      translateZ:
        values: [0, 0.2, 0, -0.2, 0]
        span: 8
      rotateX:
        values: [0, 30, 0, -30, 0]
        span: 8
      rotateY:
        values: [0, 30, 0, -30, 0]
        span: 8
      rotateZ:
        values: [0, 30, 0, -30, 0]
        span: 8
      scaleX:
        values: [1.0, 1.5, 1.0, 0.5, 1.0]
        span: 8
      scaleY:
        values: [1.0, 1.5, 1.0, 0.5, 1.0]
        span: 8
      scaleZ:
        values: [1.0, 1.5, 1.0, 0.5, 1.0]
        span: 8
  fingers:
    pair_mode: pair_same
    left_patterns:
    - '*thumbRoll_L0_ctl*'
    - '*thumb_L0_fk0_ctl*'
    - '*thumb_L0_fk1_ctl*'
    - '*thumb_L0_fk2_ctl*'
    - '*finger_L0_fk0_ctl*'
    - '*finger_L0_fk1_ctl*'
    - '*finger_L0_fk2_ctl*'
    - '*finger_L1_fk0_ctl*'
