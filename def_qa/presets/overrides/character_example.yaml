extends: biped_mgear
template: character_example
version: 0.1.0

timeline:
  start_frame: 1
  default_span: 8
  gap_frame: 4
  part_gap_frame: 12

parts:
  arms:
    tests:
      rotateY:
        values: [0, 75, 0, -75, 0]
        span: 8
  fingers:
    muted: true
    tests:
      rotateX:
        values: [0, 60, 0, -60, 0]
        span: 6

  dress:
    pair_mode: pair_mirror
    patterns:
      - "*dress*ctl"
    tests:
      rotateX:
        values: [0, 30, 0, -30, 0]
        span: 8
      rotateY:
        values: [0, 30, 0, -30, 0]
        span: 8
      rotateZ:
        values: [0, 30, 0, -30, 0]
        span: 8